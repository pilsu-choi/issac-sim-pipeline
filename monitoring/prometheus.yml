global:
  scrape_interval: 15s

scrape_configs:
  - job_name: humanoid-perception-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: humanoid-perception-gradio
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:7861
